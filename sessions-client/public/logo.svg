<!-- Light Reflection -->

<path d="M256 16 L256 496 A240 240 0 0 0 256 16" fill="url(#sheen)" />
<path d="M16 256 L496 256 A240 240 0 0 1 16 256" fill="url(#sheen)" opacity="0.5" />

